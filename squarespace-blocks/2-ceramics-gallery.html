<script>
(function(){
  if (window.__pdaCeramics) return; window.__pdaCeramics = true;
  var lb=document.getElementById('pda-lb'),
      img=document.getElementById('pda-lb-img'),
      ttl=document.getElementById('pda-lb-title'),
      lin=document.getElementById('pda-lb-line'),
      cta=document.getElementById('pda-lb-cta');
  function open(b){
    img.src=b.getAttribute('data-full'); img.alt=b.getAttribute('data-title');
    ttl.textContent=b.getAttribute('data-title'); lin.textContent=b.getAttribute('data-line');
    lb.classList.add('pda-open'); document.body.style.overflow='hidden';
  }
  function close(){ lb.classList.remove('pda-open'); document.body.style.overflow=''; }
  document.querySelectorAll('.pda-cw .pda-tile').forEach(function(b){
    b.addEventListener('click',function(){open(b);});
  });
  lb.querySelectorAll('[data-close]').forEach(function(x){x.addEventListener('click',close);});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  function glide(toY){
    if(matchMedia('(prefers-reduced-motion: reduce)').matches){window.scrollTo(0,toY);return;}
    var startY=window.scrollY,d=toY-startY,t0=performance.now(),ms=800;
    function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
    (function frame(now){var p=Math.min((now-t0)/ms,1);
      window.scrollTo(0,startY+d*ease(p));if(p<1)requestAnimationFrame(frame);})(t0);
    setTimeout(function(){if(Math.abs(window.scrollY-toY)>Math.abs(d)*.8)window.scrollTo(0,toY);},280);
  }
  cta.addEventListener('click',function(e){
    var target=document.getElementById('pda-commission');
    if(target){ e.preventDefault(); close();
      glide(target.getBoundingClientRect().top+window.scrollY-40); }
  });
})();
</script>
